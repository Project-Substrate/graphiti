# POLICY VIOLATION REMOVED: This workflow previously published to public PyPI via
# pypa/gh-action-pypi-publish. No-public-publishing policy: all code is private.
# Never publish to public PyPI, npm, crates.io, or any public registry.
# If package distribution is needed, use the private Magnon registry (PRIVATE_PYPI_URL).
name: Build & Validate Package

permissions:
  contents: read

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    runs-on: magnon-enterprise-runners
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Compare pyproject version with tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          PROJECT_VERSION=$(uv run python -c "import tomllib; print('v' + tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match the project version $PROJECT_VERSION"
            exit 1
          fi
      - name: Build project for distribution
        run: uv build
      # REMOVED: "Publish package distributions to PyPI" step (pypa/gh-action-pypi-publish).
      # All code is private. Never publish to public PyPI.
      # To publish to the private Magnon registry, use twine with PRIVATE_PYPI_URL.
